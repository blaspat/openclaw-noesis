name: "Version Bump"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Automated Version Bump
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_FILENAME: "openclaw.plugin.json"
        with:
          minor-wording: "feat:,FEATURE:,feature:"
          major-wording: "BREAKING:,MAJOR:"
          patch-wording: "fix:,patch:,bug:,hotfix:"
          commit-message: "chore: bump version to {{version}}"
