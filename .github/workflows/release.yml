name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  # ── Step 1: Bump version + commit (no tag yet) ──────────────────────────────
  bump:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.NEW_VERSION }}
      commit_sha: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import --yes

      - name: Bump version
        id: bump
        run: |
          git config --global commit.gpgsign true
          git config --global user.signingkey "$GPG_KEY_ID"
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "$GPG_USER_EMAIL"
          node scripts/bump-version.js
          VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          git add package.json openclaw.plugin.json
          git commit -m "chore: bump version to v$VERSION"
          git push origin main
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_USER_EMAIL: ${{ secrets.GPG_USER_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: Publish to npm on the bumped commit ─────────────────────────────
  publish:
    needs: bump
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install & Build
        run: npm ci && npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Step 3: Create GitHub Release (handles tagging automatically) ──────────
  release:
    needs: [bump, publish]
    runs-on: ubuntu-latest

    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.bump.outputs.NEW_VERSION }}
          generate_release_notes: true