name: Version Bump

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize, edited, ready_for_review, labeled, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.event.pull_request.state == 'open'
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Bump version inline
        id: bump
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            const newVersion = major+'.'+minor+'.'+(patch+1);
            console.log('Bump:', pkg.version, '->', newVersion);
            pkg.version = newVersion;
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
            const plugin = JSON.parse(fs.readFileSync('openclaw.plugin.json','utf8'));
            plugin.version = newVersion;
            fs.writeFileSync('openclaw.plugin.json', JSON.stringify(plugin,null,2)+'\n');
            console.log('Files updated');
          "

      - name: Push version bump to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json openclaw.plugin.json
          git diff --cached --stat
          git commit -m "chore: bump version" || echo "No changes to commit"
          git push origin ${{ github.event.pull_request.head.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}