name: Version Bump

on:
  pull_request_target:
    types: [opened, synchronize, edited, ready_for_review, labeled, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install deps
        run: npm ci

      - name: Check current version
        id: check
        run: |
          echo "NODE_VERSION=$(node --version)"
          echo "Current package.json version:"
          cat package.json | grep '"version"'
          node scripts/bump-version.js
          echo "=== After bump ==="
          cat package.json | grep '"version"'

      - name: Push version bump to PR branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json openclaw.plugin.json
          git diff --cached --stat
          git commit -m "chore: bump version" || echo "Nothing to commit"
          git push origin ${{ github.event.pull_request.head.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}