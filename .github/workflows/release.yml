name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: "@blaspat/openclaw-noesis"
          default-branch: main
          changelog-path: CHANGELOG.md
          version-file: package.json
          extra-files: openclaw.plugin.json
          commit-message: "chore: release {{version}}"
          pr-title: "chore: release {{version}}"
          labels: "autorelease"
          filterIncludes: "autorelease"
