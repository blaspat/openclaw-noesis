name: "Version Bump"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Automated Version Bump
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional commit keywords
          minor-wording: "feat:,FEATURE:,feature:"
          major-wording: "BREAKING:,MAJOR:"
          patch-wording: "fix:,patch:,bug:,hotfix:"
          default: "patch"
          # Update both package.json and openclaw.plugin.json
          target-files: |
            package.json
            openclaw.plugin.json
          commit-message: "chore: bump version to {{version}}"
          tag-message: "v{{version}}"
